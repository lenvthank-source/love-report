<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed — Cosmic Blueprint</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/favicon.png?v=2">

    <style>
        :root {
            --bg-color: #FAF4EE; /* Soft warm light cream background */
            --card-bg: #FFFFFF; /* Pure white card */
            --primary: #C9967B; /* Warm rose gold */
            --primary-dark: #8E5A40;
            --accent: #A93B52; /* Delicate rose berry */
            --text-dark: #3C332D; /* Rich chocolate brown */
            --text-muted: #96867F; /* Warm taupe */
            --border-color: rgba(201, 150, 123, 0.28);
            --shadow: 0 30px 60px rgba(142, 110, 94, 0.08);
            --transition-fluid: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(201, 150, 123, 0.05) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(169, 59, 82, 0.04) 0%, transparent 45%);
            color: var(--text-dark);
            font-family: 'Lora', Georgia, serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* --- Floating Stardust Particles --- */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        .star-particle {
            position: absolute;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.25;
            animation: drift-float 22s linear infinite;
        }

        @keyframes drift-float {
            0% { transform: translateY(100vh) scale(0.8); opacity: 0; }
            10% { opacity: 0.35; }
            90% { opacity: 0.35; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* --- Card Frame --- */
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 55px 45px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            z-index: 10;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .container::after {
            content: '';
            position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 1px solid rgba(201, 150, 123, 0.08);
            border-radius: 2px;
            pointer-events: none;
        }

        .success-icon {
            font-size: 3.5rem;
            color: var(--primary-dark);
            margin-bottom: 25px;
            display: inline-block;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-weight: 300;
            letter-spacing: 3px;
            color: var(--text-dark);
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .divider {
            width: 70px;
            height: 1.5px;
            background: var(--primary);
            margin: 15px auto 25px;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .receipt-box {
            background: rgba(201, 150, 123, 0.02);
            border: 1px dashed var(--primary);
            border-radius: 4px;
            padding: 24px;
            margin: 30px 0;
            text-align: left;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .receipt-row:last-child {
            margin-bottom: 0;
        }

        .label {
            font-family: 'Jost', sans-serif;
            color: var(--primary-dark);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .val {
            color: var(--text-dark);
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #C9967B 0%, #A67358 100%);
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 30px; /* Pill */
            padding: 16px 45px;
            font-family: 'Jost', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
            transition: var(--transition-fluid);
            box-shadow: 0 4px 18px rgba(201, 150, 123, 0.25);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(201, 150, 123, 0.35);
        }
    </style>
</head>
<body>

    <!-- Floating stardust particles -->
    <div class="stars-container" id="starsContainer"></div>

    <div class="container">
        <span class="success-icon">✨</span>
        <h1>Order Confirmed</h1>
        <div class="divider"></div>
        <p>Your birth details have been registered. Acharya Savvy Singh will begin preparing your personalized report.</p>
        
        <div class="receipt-box">
            <div class="receipt-row">
                <span class="label">Client Name</span>
                <span class="val" id="clientName">-</span>
            </div>
            <div class="receipt-row">
                <span class="label">Order ID</span>
                <span class="val" id="orderId" style="font-family: monospace;">-</span>
            </div>
            <div class="receipt-row">
                <span class="label">Amount Paid</span>
                <span class="val">₹499.00</span>
            </div>
            <div class="receipt-row">
                <span class="label">Timeline</span>
                <span class="val" style="color: var(--primary-dark); font-weight: 600; letter-spacing: 0.5px;">24 – 36 Hours</span>
            </div>
        </div>

        <p style="font-size: 0.95rem; color: var(--accent); font-style: italic;">
            A confirmation receipt has been dispatched to your email.
        </p>

        <a href="/order" class="btn">Place Another Order</a>
    </div>

    <script>
        // Generate floating stardust particles dynamically
        const starsContainer = document.getElementById("starsContainer");
        for (let i = 0; i < 10; i++) {
            const star = document.createElement("div");
            star.className = "star-particle";
            star.style.left = `${Math.random() * 100}vw`;
            star.style.width = `${Math.random() * 3 + 2}px`;
            star.style.height = star.style.width;
            star.style.animationDelay = `${Math.random() * 12}s`;
            star.style.animationDuration = `${Math.random() * 12 + 15}s`;
            starsContainer.appendChild(star);
        }

        const params = new URLSearchParams(window.location.search);
        document.getElementById("clientName").innerText = params.get("name") || "Valued Client";
        document.getElementById("orderId").innerText = params.get("order_id") || "N/A";
    </script>
</body>
</html>
