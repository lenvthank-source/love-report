<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 Admin Access — Cosmic Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/favicon.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #FAF4EE; /* Soft warm light cream background */
            --card-bg: #FFFFFF; /* Pure white card */
            --primary: #C9967B; /* Warm rose gold */
            --primary-dark: #8E5A40;
            --accent: #A93B52; /* Delicate rose berry */
            --text-dark: #3C332D; /* Rich chocolate brown */
            --text-muted: #96867F; /* Warm taupe */
            --border-color: rgba(201, 150, 123, 0.28);
            --shadow: 0 30px 60px rgba(142, 110, 94, 0.08);
            --transition-fluid: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(201, 150, 123, 0.05) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(169, 59, 82, 0.04) 0%, transparent 45%);
            color: var(--text-dark);
            font-family: 'Lora', Georgia, serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- Floating Stardust Particles --- */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        .star-particle {
            position: absolute;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.25;
            animation: drift-float 22s linear infinite;
        }

        @keyframes drift-float {
            0% { transform: translateY(100vh) scale(0.8); opacity: 0; }
            10% { opacity: 0.35; }
            90% { opacity: 0.35; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* --- Card Frame --- */
        .container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 55px 45px;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 10;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .container::after {
            content: '';
            position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 1px solid rgba(201, 150, 123, 0.08);
            border-radius: 2px;
            pointer-events: none;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.1rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        header p {
            font-size: 0.95rem;
            color: var(--primary-dark);
            font-style: italic;
        }

        .divider {
            width: 70px;
            height: 1.5px;
            background: var(--primary);
            margin: 15px auto 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 25px;
            position: relative;
        }

        label {
            font-family: 'Jost', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: var(--transition-fluid);
        }

        /* Seamless Underline Fields */
        input {
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--border-color);
            border-radius: 0;
            padding: 10px 0;
            color: var(--text-dark);
            font-family: 'Lora', serif;
            font-size: 1rem;
            outline: none;
            transition: var(--transition-fluid);
        }

        input:focus {
            border-bottom-color: var(--primary-dark);
        }

        /* Expanding gold focus line */
        .form-group::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%; width: 0; height: 1.5px;
            background: var(--accent);
            transition: var(--transition-fluid);
        }

        .form-group:focus-within::after {
            left: 0;
            width: 100%;
        }

        .form-group:focus-within label {
            color: var(--accent);
        }

        .submit-btn {
            background: linear-gradient(135deg, #C9967B 0%, #A67358 100%);
            color: #FFFFFF;
            border: none;
            border-radius: 30px; /* Pill */
            padding: 16px 45px;
            font-family: 'Jost', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            cursor: pointer;
            transition: var(--transition-fluid);
            box-shadow: 0 4px 18px rgba(201, 150, 123, 0.25);
            width: 100%;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(201, 150, 123, 0.35);
        }

        .submit-btn:disabled {
            background: #D8CEC6;
            color: #9E928A;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-message {
            background: rgba(220, 53, 69, 0.08);
            border-left: 3px solid #DC3545;
            color: #C0392B;
            padding: 12px 18px;
            border-radius: 4px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Floating stardust particles -->
    <div class="stars-container" id="starsContainer"></div>

    <div class="container">
        <header>
            <h1>Admin Panel</h1>
            <p>Secure Astrological Credentials</p>
            <div class="divider"></div>
        </header>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Admin Email</label>
                <input type="email" id="email" required placeholder="admin@domain.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="submit-btn" id="loginBtn">🔒 Authenticate</button>
        </form>
    </div>

    <script>
        // Generate floating stardust particles dynamically
        const starsContainer = document.getElementById("starsContainer");
        for (let i = 0; i < 8; i++) {
            const star = document.createElement("div");
            star.className = "star-particle";
            star.style.left = `${Math.random() * 100}vw`;
            star.style.width = `${Math.random() * 3 + 2}px`;
            star.style.height = star.style.width;
            star.style.animationDelay = `${Math.random() * 10}s`;
            star.style.animationDuration = `${Math.random() * 10 + 15}s`;
            starsContainer.appendChild(star);
        }

        let supabaseUrl = "";
        let supabaseAnonKey = "";
        let supabase = null;

        // Fetch Supabase credentials from local server endpoints
        async function initAuth() {
            try {
                const res = await fetch("/api/admin/orders", { method: "GET" });
                if (res.status === 401) {
                    const credentialsRes = await fetch("/api/orders/create", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ get_supabase_keys: true }) }).catch(() => null);
                }
            } catch (e) {
                console.error(e);
            }
        }

        // We fetch public keys dynamically or bind locally
        async function getKeys() {
            try {
                const r = await fetch("/api/orders/create", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ dummy: true }) 
                });
            } catch(e){}
        }

        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const errBanner = document.getElementById("errorMessage");
            const btn = document.getElementById("loginBtn");

            btn.disabled = true;
            errBanner.style.display = "none";

            try {
                const res = await fetch("/api/orders/create", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ auth_admin: true, email, password })
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || "Authentication failed.");
                }

                const data = await res.json();
                localStorage.setItem("admin_token", data.access_token);
                window.location.href = "/admin";
            } catch(err) {
                errBanner.innerText = err.message;
                errBanner.style.display = "block";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
