<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 Admin Access — Cosmic Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0F0B09;
            --card-bg: rgba(30, 22, 20, 0.75);
            --primary: #C9967B;
            --primary-glow: rgba(201, 150, 123, 0.25);
            --text: #F3EDE4;
            --border: rgba(201, 150, 123, 0.25);
            --accent: #E8C9B6;
            --input-bg: rgba(20, 15, 13, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(201, 150, 123, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(110, 79, 64, 0.08) 0%, transparent 40%);
            color: var(--text);
            font-family: 'Lora', Georgia, serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        header p {
            font-size: 0.95rem;
            color: var(--primary);
            font-style: italic;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 16px;
            color: var(--text);
            font-family: 'Lora', serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .submit-btn {
            background: linear-gradient(135deg, #C9967B 0%, #A67358 100%);
            color: #FFFFFF;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-family: 'Lora', serif;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(201, 150, 123, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201, 150, 123, 0.4);
        }

        .error-banner {
            background: rgba(220, 53, 69, 0.15);
            border-left: 4px solid #DC3545;
            color: #FFC0C5;
            padding: 12px 16px;
            border-radius: 0 6px 6px 0;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Admin Login</h1>
            <p>Authorized access only</p>
        </header>

        <div class="error-banner" id="errorBanner"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Admin Email</label>
                <input type="email" id="email" required placeholder="admin@cosmicreport.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="submit-btn" id="loginBtn">🔐 ENTER CONTROL PANEL</button>
        </form>
    </div>

    <script>
        let supabase = null;

        // Initialize Supabase configuration by fetching public credentials from backend
        async function init() {
            try {
                const r = await fetch('/api/config');
                const config = await r.json();
                
                if (config.supabase_url && config.supabase_anon_key) {
                    supabase = supabaseJs.createClient(config.supabase_url, config.supabase_anon_key);
                } else {
                    console.warn("Supabase credentials not configured on backend. Bypass verification enabled.");
                }
            } catch (e) {
                console.error("Config fetch failed:", e);
            }
        }

        const loginForm = document.getElementById("loginForm");
        const errorBanner = document.getElementById("errorBanner");
        const loginBtn = document.getElementById("loginBtn");

        loginForm.addEventListener("submit", async function(e) {
            e.preventDefault();
            errorBanner.style.display = "none";
            loginBtn.disabled = true;
            loginBtn.innerText = "Authenticating...";

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            // Mock admin check if Supabase is not configured yet
            if (!supabase) {
                if (email === "admin@test.com" && password === "admin123") {
                    localStorage.setItem("admin_token", "mock-token-session-bypass");
                    window.location.href = "/admin";
                } else {
                    errorBanner.innerText = "Mock login details: admin@test.com / admin123";
                    errorBanner.style.display = "block";
                    loginBtn.disabled = false;
                    loginBtn.innerText = "🔐 ENTER CONTROL PANEL";
                }
                return;
            }

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    throw error;
                }

                // Save session token and redirect
                localStorage.setItem("admin_token", data.session.access_token);
                window.location.href = "/admin";
            } catch (err) {
                errorBanner.innerText = err.message || "Authentication failed.";
                errorBanner.style.display = "block";
                loginBtn.disabled = false;
                loginBtn.innerText = "🔐 ENTER CONTROL PANEL";
            }
        });

        init();
    </script>
</body>
</html>
