<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 Astrological Report Compiler — Testbed</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0807;
            --card-bg: rgba(26, 18, 17, 0.7);
            --primary: #c5a28c;
            --primary-glow: rgba(197, 162, 140, 0.2);
            --text: #eae6e3;
            --text-dim: #a69e9a;
            --accent: #d48a6a;
            --border: rgba(142, 110, 94, 0.3);
            --terminal-bg: #110d0c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(142, 110, 94, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 138, 106, 0.05) 0%, transparent 40%);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow);
            margin-bottom: 10px;
        }

        header p {
            font-size: 1rem;
            color: var(--text-dim);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input, .form-group select {
            background: rgba(25, 18, 17, 0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .submit-btn {
            grid-column: span 2;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border: none;
            border-radius: 8px;
            padding: 15px;
            color: var(--bg-color);
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 768px) {
            .submit-btn {
                grid-column: span 1;
            }
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(197, 162, 140, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: #4A3E3D;
            color: var(--text-dim);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Terminal Window styling */
        .terminal-container {
            margin-top: 30px;
            background: var(--terminal-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .terminal-header {
            background: rgba(44, 31, 29, 0.5);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .terminal-title {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            color: var(--primary);
            text-transform: uppercase;
        }

        .terminal-buttons {
            display: flex;
            gap: 6px;
        }

        .terminal-btn {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff5f56;
        }
        .terminal-btn.yellow { background: #ffbd2e; }
        .terminal-btn.green { background: #27c93f; }

        .terminal-body {
            height: 250px;
            overflow-y: auto;
            padding: 15px;
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #d4c5bd;
        }

        .log-entry {
            margin-bottom: 6px;
            white-space: pre-wrap;
        }

        .log-info { color: #8e8077; }
        .log-success { color: #a4c2a8; }
        .log-warning { color: #d4a373; }
        .log-error { color: #e07a5f; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🔮 COSMIC REPORT COMPILER</h1>
        <p>Internal testbed for multi-model PDF report generation</p>
    </header>

    <form id="generateForm" onsubmit="startGeneration(event)" class="grid">
        <div class="form-group">
            <label for="name">Client Name</label>
            <input type="text" id="name" required placeholder="e.g. Dev" value="Dev">
        </div>

        <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" required>
                <option value="Male" selected>Male</option>
                <option value="Female">Female</option>
            </select>
        </div>

        <div class="form-group">
            <label for="dob">Birth Date</label>
            <input type="date" id="dob" required value="1999-10-15">
        </div>

        <div class="form-group">
            <label for="tob">Birth Time</label>
            <input type="time" id="tob" required value="18:52">
        </div>

        <div class="form-group">
            <label for="place">Birth Place</label>
            <input type="text" id="place" required placeholder="e.g. Delhi, India" value="Delhi, India">
        </div>

        <div class="form-group">
            <label for="provider">AI Provider</label>
            <select id="provider" required>
                <option value="gemini" selected>Gemini (gemini-3.1-flash-lite)</option>
                <option value="groq">Groq (openai/gpt-oss-120b)</option>
                <option value="openrouter">OpenRouter (google/gemma-4-31b-it:free)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="model">Model Name / Identifier</label>
            <input type="text" id="model" list="modelList" required placeholder="e.g. gemini-3.1-flash-lite" value="gemini-3.1-flash-lite">
            <datalist id="modelList">
                <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
                <option value="gemini-3.1-flash">Gemini 3.1 Flash</option>
                <option value="gemini-3.5-pro">Gemini 3.5 Pro</option>
            </datalist>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">COMPILE & DOWNLOAD REPORT</button>
    </form>

    <div class="terminal-container">
        <div class="terminal-header">
            <div class="terminal-title">Compilation Log Stream</div>
            <div class="terminal-buttons">
                <div class="terminal-btn"></div>
                <div class="terminal-btn yellow"></div>
                <div class="terminal-btn green"></div>
            </div>
        </div>
        <div class="terminal-body" id="terminal">
            <div class="log-entry log-info">[System] Ready. Enter birth parameters and click generate.</div>
        </div>
    </div>
</div>

<script>
    const modelsMap = {
        gemini: [
            { value: "gemini-3.1-flash-lite", label: "Gemini 3.1 Flash Lite" },
            { value: "gemini-3.1-flash", label: "Gemini 3.1 Flash" },
            { value: "gemini-3.5-pro", label: "Gemini 3.5 Pro" }
        ],
        groq: [
            { value: "openai/gpt-oss-120b", label: "GPT-OSS 120B" },
            { value: "qwen/qwen3-32b", label: "Qwen3 32B" },
            { value: "qwen/qwen3.6-27b", label: "Qwen3.6 27B" }
        ],
        openrouter: [
            { value: "google/gemma-4-31b-it:free", label: "Gemma 4 31B IT" },
            { value: "qwen/qwen3-32b", label: "Qwen3 32B" },
            { value: "qwen/qwen3.6-27b", label: "Qwen3.6 27B" }
        ]
    };

    function updateModelOptions(provider) {
        const modelInput = document.getElementById("model");
        const datalist = document.getElementById("modelList");
        datalist.innerHTML = "";
        
        const options = modelsMap[provider] || [];
        options.forEach(opt => {
            const option = document.createElement("option");
            option.value = opt.value;
            option.textContent = opt.label;
            datalist.appendChild(option);
        });
        
        if (options.length > 0) {
            modelInput.value = options[0].value;
        }
    }

    document.getElementById("provider").addEventListener("change", function(e) {
        updateModelOptions(e.target.value);
    });

    let logEventSource = null;

    function addLog(text, type = "info") {
        const terminal = document.getElementById("terminal");
        const entry = document.createElement("div");
        entry.className = `log-entry log-${type}`;
        entry.innerText = text;
        terminal.appendChild(entry);
        terminal.scrollTop = terminal.scrollHeight;
    }

    async function startGeneration(event) {
        event.preventDefault();
        
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;
        
        const name = document.getElementById("name").value;
        const gender = document.getElementById("gender").value;
        const dob = document.getElementById("dob").value;
        const tob = document.getElementById("tob").value;
        const place = document.getElementById("place").value;
        const provider = document.getElementById("provider").value;
        const model = document.getElementById("model").value;

        // Clear terminal
        const terminal = document.getElementById("terminal");
        terminal.innerHTML = "";
        
        // Generate a random session ID to isolate logs
        const sessionId = Math.random().toString(36).substring(2, 15);
        
        addLog(`[System] Initializing session ${sessionId}...`, "info");
        addLog(`[System] Selected Model Provider: ${provider.toUpperCase()}`, "info");

        // 1. Establish SSE Connection for logs
        if (logEventSource) {
            logEventSource.close();
        }
        
        logEventSource = new EventSource(`/api/logs?session_id=${sessionId}`);
        logEventSource.onmessage = function(e) {
            const data = JSON.parse(e.data);
            addLog(data.message, data.level);
        };
        logEventSource.onerror = function() {
            addLog("[System] Log stream disconnected.", "info");
            logEventSource.close();
        };

        // 2. Trigger Post Request
        try {
            addLog("[System] Dispatching compilation request...", "info");
            const response = await fetch(`/api/generate?session_id=${sessionId}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, gender, dob, tob, place, provider, model })
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.detail || "Generation failed.");
            }

            // Download Blob
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `${name.toLowerCase()}_individual_love_report.pdf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
            
            addLog("[System] Report compiled and downloaded successfully!", "success");
        } catch (err) {
            addLog(`[Error] ${err.message}`, "error");
        } finally {
            submitBtn.disabled = false;
            if (logEventSource) {
                // Keep the log connection open briefly to catch closing logs
                setTimeout(() => {
                    logEventSource.close();
                }, 2000);
            }
        }
    }
</script>
</body>
</html>
