<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔮 Cosmic Love Report — Astro Savvy</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Lora:ital,wght@0,400;0,500;1,400&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        :root {
            --bg: #FAF4EE; /* Soft warm light cream background */
            --card-bg: #FFFFFF; /* Pure white card */
            --primary: #C9967B; /* Warm rose gold */
            --primary-dark: #8E5A40;
            --accent: #A93B52; /* Deep rose berry */
            --text-dark: #3C332D; /* Soft dark brown text */
            --text-muted: #96867F; /* Muted warm grey */
            --border-color: rgba(201, 150, 123, 0.28);
            --transition-fluid: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-dark);
            font-family: 'Lora', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            overflow-x: hidden;
        }

        /* --- Floating particles --- */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        .star-particle {
            position: absolute;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.25;
            animation: drift-float 22s linear infinite;
        }

        @keyframes drift-float {
            0% { transform: translateY(100vh) scale(0.8); opacity: 0; }
            10% { opacity: 0.35; }
            90% { opacity: 0.35; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* --- Header: Cover Page Display --- */
        .mobile-header {
            width: 100%;
            max-width: 440px;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 10;
            animation: fadeInHeader 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInHeader {
            0% { opacity: 0; transform: translateY(-15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Arched Badge Preview */
        .cover-badge {
            width: 120px;
            aspect-ratio: 1 / 1.45;
            border-radius: 60px 60px 6px 6px;
            box-shadow: 0 15px 35px rgba(142, 110, 94, 0.15);
            border: 1.5px solid var(--primary);
            margin: 0 auto 15px;
            background-image: url("/Coverpage.png");
            background-size: cover;
            background-position: center;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
            color: var(--text-dark);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--primary-dark);
            font-style: italic;
        }

        /* --- Seamless Form (NO CLUNKY BOXES) --- */
        .mobile-form-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 10;
            animation: fadeInCard 1s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 0 10px;
        }

        @keyframes fadeInCard {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .step-panel h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            color: var(--primary-dark);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(201, 150, 123, 0.2);
            padding-bottom: 6px;
        }

        .form-fields {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
        }

        label {
            font-family: 'Jost', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition-fluid);
        }

        /* Underline touch fields */
        input, select {
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--border-color);
            border-radius: 0;
            padding: 10px 0;
            color: var(--text-dark);
            font-family: 'Lora', serif;
            font-size: 1rem;
            outline: none;
            width: 100%;
            transition: var(--transition-fluid);
        }

        input:focus, select:focus {
            border-bottom-color: var(--primary-dark);
        }

        /* Expanding focus line */
        .form-group::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%; width: 0; height: 1.5px;
            background: var(--accent);
            transition: var(--transition-fluid);
        }

        .form-group:focus-within::after {
            left: 0;
            width: 100%;
        }

        .form-group:focus-within label {
            color: var(--accent);
        }

        /* Autocomplete results dropdown */
        .autocomplete-list {
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: #FFFFFF;
            border: 1px solid var(--primary);
            border-radius: 4px;
            max-height: 160px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 10px 25px rgba(142, 110, 94, 0.12);
            display: none;
            opacity: 0;
            transform: translateY(5px);
            transition: opacity 0.3s, transform 0.3s;
        }

        .autocomplete-list.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .autocomplete-item {
            padding: 12px;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(201, 150, 123, 0.08);
            color: var(--text-dark);
        }

        .autocomplete-item:hover {
            background: rgba(201, 150, 123, 0.08);
        }

        /* Price summary */
        .price-summary {
            background: rgba(201,150,123,0.02);
            border-top: 1px solid rgba(201, 150, 123, 0.2);
            border-bottom: 1px solid rgba(201, 150, 123, 0.2);
            padding: 24px 0;
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .price-summary h4 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.7rem;
            color: var(--text-dark);
        }

        .price-summary h4 span {
            color: var(--primary-dark);
            font-weight: bold;
        }

        /* Pill touch button */
        .action-btn {
            padding: 16px 20px;
            font-family: 'Jost', sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: var(--transition-fluid);
            background: linear-gradient(135deg, #C9967B 0%, #A67358 100%);
            color: #FFFFFF;
            box-shadow: 0 4px 15px rgba(201, 150, 123, 0.2);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        /* Blur Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(250, 244, 238, 0.92);
            backdrop-filter: blur(5px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            transition: opacity 0.3s ease;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 2px solid rgba(201, 150, 123, 0.2);
            border-top: 2px solid var(--primary-dark);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-banner {
            background: rgba(220, 53, 69, 0.08);
            border-left: 3px solid #DC3545;
            color: #C0392B;
            padding: 10px 14px;
            font-size: 0.85rem;
            border-radius: 2px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Floating stardust particles -->
    <div class="stars-container" id="starsContainer"></div>

    <!-- Header containing Book Badge -->
    <div class="mobile-header">
        <div class="cover-badge"></div>
        <h1>Order Your Report</h1>
        <div class="subtitle">Prepared by Acharya Savvy Singh</div>
    </div>

    <!-- Mobile Form Container -->
    <div class="mobile-form-container">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p style="margin-top: 15px; font-size: 0.9rem; color: var(--primary-dark); font-style: italic;">Aligning birth charts...</p>
        </div>

        <div class="error-banner" id="errorBanner"></div>

        <form id="orderForm">
            <div class="step-panel active">
                <h3>Birth Details &amp; Contact</h3>
                <div class="form-fields">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required placeholder="e.g. Meera Patel">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="e.g. meera@domain.com">
                    </div>
                    <div class="form-group">
                        <label for="mobile">Mobile Number</label>
                        <input type="tel" id="mobile" required placeholder="e.g. +91 98765 43210">
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" required>
                            <option value="Female" selected>Female</option>
                            <option value="Male">Male</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="dob">Date of Birth</label>
                        <input type="date" id="dob" required>
                    </div>
                    <div class="form-group">
                        <label for="tob">Time of Birth</label>
                        <input type="time" id="tob" required>
                    </div>
                    <div class="form-group">
                        <label for="birthplace">Place of Birth (Search)</label>
                        <input type="text" id="birthplace" required autocomplete="off" placeholder="Search city...">
                        <div class="autocomplete-list" id="autocompleteList"></div>
                    </div>
                </div>

                <div>
                    <div class="price-summary">
                        <h4>Creation Fee: <span>₹499</span></h4>
                        <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 8px; line-height: 1.5;">
                            Delivered to your email within 24 to 36 hours.
                        </p>
                    </div>
                    <button type="submit" class="action-btn" id="payBtn">💳 Proceed to Payment</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        // Generate floating stardust particles dynamically for mobile
        const starsContainer = document.getElementById("starsContainer");
        for (let i = 0; i < 8; i++) {
            const star = document.createElement("div");
            star.className = "star-particle";
            star.style.left = `${Math.random() * 100}vw`;
            star.style.width = `${Math.random() * 3 + 2}px`;
            star.style.height = star.style.width;
            star.style.animationDelay = `${Math.random() * 10}s`;
            star.style.animationDuration = `${Math.random() * 10 + 15}s`;
            starsContainer.appendChild(star);
        }

        let selectedPlace = null;
        let autocompleteTimeout = null;

        const birthplaceInput = document.getElementById("birthplace");
        const autocompleteList = document.getElementById("autocompleteList");
        const orderForm = document.getElementById("orderForm");
        const loadingOverlay = document.getElementById("loadingOverlay");
        const errorBanner = document.getElementById("errorBanner");

        // Autocomplete Search logic
        birthplaceInput.addEventListener("input", function() {
            const query = this.value.trim();
            if (query.length < 3) {
                autocompleteList.classList.remove("show");
                setTimeout(() => { autocompleteList.style.display = "none"; }, 300);
                return;
            }

            clearTimeout(autocompleteTimeout);
            autocompleteTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`/api/geocode?q=${encodeURIComponent(query)}`);
                    const data = await response.json();
                    
                    if (data.results && data.results.length > 0) {
                        autocompleteList.innerHTML = "";
                        data.results.forEach(res => {
                            const div = document.createElement("div");
                            div.className = "autocomplete-item";
                            div.innerText = res.formatted;
                            div.addEventListener("click", () => {
                                birthplaceInput.value = res.formatted;
                                selectedPlace = res;
                                autocompleteList.classList.remove("show");
                                setTimeout(() => { autocompleteList.style.display = "none"; }, 300);
                                showError("");
                            });
                            autocompleteList.appendChild(div);
                        });
                        autocompleteList.style.display = "block";
                        setTimeout(() => { autocompleteList.classList.add("show"); }, 50);
                    } else {
                        autocompleteList.classList.remove("show");
                        setTimeout(() => { autocompleteList.style.display = "none"; }, 300);
                    }
                } catch (e) {
                    console.error("Geocoding failed:", e);
                }
            }, 300);
        });

        document.addEventListener("click", (e) => {
            if (e.target !== birthplaceInput) {
                autocompleteList.classList.remove("show");
                setTimeout(() => { autocompleteList.style.display = "none"; }, 300);
            }
        });

        function showLoading(show) {
            if (show) {
                loadingOverlay.style.display = "flex";
                setTimeout(() => { loadingOverlay.style.opacity = "1"; }, 50);
            } else {
                loadingOverlay.style.opacity = "0";
                setTimeout(() => { loadingOverlay.style.display = "none"; }, 300);
            }
        }

        function showError(msg) {
            if (msg) {
                errorBanner.innerText = msg;
                errorBanner.style.display = "block";
            } else {
                errorBanner.style.display = "none";
            }
        }

        orderForm.addEventListener("submit", async function(e) {
            e.preventDefault();
            showError("");

            if (!selectedPlace || birthplaceInput.value !== selectedPlace.formatted) {
                showError("Please search and select a verified birthplace.");
                return;
            }

            showLoading(true);

            try {
                const payload = {
                    name: document.getElementById("name").value,
                    email: document.getElementById("email").value,
                    mobile: document.getElementById("mobile").value,
                    gender: document.getElementById("gender").value,
                    dob: document.getElementById("dob").value,
                    tob: document.getElementById("tob").value,
                    place: selectedPlace.formatted,
                    latitude: selectedPlace.latitude,
                    longitude: selectedPlace.longitude,
                    timezone: selectedPlace.timezone,
                    geocoded_place: selectedPlace.raw
                };

                const res = await fetch("/api/orders/create", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                
                if (!res.ok) throw new Error("Failed to create order on server.");

                const order = await res.json();
                showLoading(false);

                const options = {
                    key: order.razorpay_order_id.startsWith("order_mock_") ? "rzp_test_mock" : "",
                    amount: order.amount,
                    currency: order.currency,
                    name: "Acharya Savvy Singh",
                    description: "Love & Marriage Destiny Report Fee",
                    order_id: order.razorpay_order_id,
                    handler: async function(payment) {
                        showLoading(true);
                        try {
                            const verifyPayload = {
                                order_id: order.order_id,
                                razorpay_order_id: payment.razorpay_order_id,
                                razorpay_payment_id: payment.razorpay_payment_id,
                                razorpay_signature: payment.razorpay_signature
                            };

                            const verifyRes = await fetch("/api/payments/verify", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify(verifyPayload)
                            });

                            if (!verifyRes.ok) throw new Error("Payment validation failed.");

                            window.location.href = `/success?order_id=${order.order_id}&name=${encodeURIComponent(payload.name)}&email=${encodeURIComponent(payload.email)}`;
                        } catch (err) {
                            showLoading(false);
                            showError(err.message);
                        }
                    },
                    prefill: {
                        name: payload.name,
                        email: payload.email,
                        contact: payload.mobile
                    },
                    theme: { color: "#C9967B" }
                };

                const rzp = new Razorpay(options);
                rzp.open();

                rzp.on('payment.failed', function(response) {
                    showError(`Payment failed: ${response.error.description}`);
                });

            } catch (err) {
                showLoading(false);
                showError(err.message);
            }
        });
    </script>
</body>
</html>
